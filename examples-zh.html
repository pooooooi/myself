        <h2>例：一直在看手机</h2>
        <div class="example-grid">
          <p class="example-card"><strong>过去的事件</strong><span>打开资料前一直在看手机。</span></p>
          <p class="example-card"><strong>感受</strong><span>沉重。害怕失败。</span></p>
          <p class="example-card"><strong>固有想法</strong><span>如果不能好好做，就不要碰。</span></p>
          <p class="example-card"><strong>价值观</strong><span>我不想随便对待这件事。</span></p>
          <p class="example-card"><strong>新的价值观</strong><span>回来十秒，也能重新开始。</span></p>
          <p class="example-card"><strong>尝试行动</strong><span>打开资料，只读标题。</span></p>
