  <body><main class="content-page"><header class="content-hero"><nav><a href="index.html">打开应用</a><a href="articles-zh.html">文章</a><a href="guide-zh.html">用法</a><a href="privacy-zh.html">隐私</a></nav><p class="eyebrow">Mobile</p><h1>在手机上做思考整理</h1><p>手机不适合写很长的文章，但很适合在当下留下短而真实的记录。</p></header><div class="content-layout"><article class="article-stack"><section class="article-section"><h2>一句话就够</h2><p>手机输入很容易累。每张卡片只写一句话也可以：一个事件、一个感受、一个想法、一个行动。</p></section><section class="article-section"><h2>重要操作要容易按到</h2><p>手机应用的设计不只是外观。重要按钮应该在拇指容易触到的位置，不常用的操作不要挤在书写区域里。</p></section><div class="ad-slot">Ad space</div><section class="article-section"><h2>横向流程显示进度</h2><p>Self Map 在手机上使用横向看板，是为了让用户从过去事件一步步走向行动。方向本身也在提示接下来写什么。</p></section></article><aside class="summary-panel"><h2>手机上的原则</h2><p>少写一点，先走到行动步骤。需要时再回来补充。</p><a class="button primary" href="index.html">打开 Self Map</a></aside></div></main>    <script src="site-nav.js" defer></script>
