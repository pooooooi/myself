  <body><main class="legal-page"><header class="legal-header"><a href="index.html">Self Map</a><p class="eyebrow">Privacy</p><h1>隐私政策</h1><p>最后更新：2026年4月30日</p></header><div class="legal-content"><section><h2>1. 关于本应用</h2><p>Self Map 是一个整理回顾，并把它变成小行动的笔记应用。</p></section><section><h2>2. 收集的信息</h2><p>Self Map 不会把你输入的内容发送到外部服务器。卡片内容、场景名称、连接信息、回顾和语言设置会保存在你的设备上。</p></section><section><h2>3. 使用目的</h2><p>这些数据用于恢复笔记、保持整理状态、显示回顾，并记住显示语言。</p></section><section><h2>4. 第三方共享</h2><p>Self Map 不会把你输入的数据分享给第三方。</p></section><section><h2>5. 保存位置</h2><p>数据保存在本地。如果删除应用、清除浏览器数据、重置或丢失设备，内容可能会消失。重要内容请使用导出功能备份。</p></section></div></main></body>
